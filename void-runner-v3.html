<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID RUNNER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
:root{--cyan:#00ffe7;--pink:#ff2d78;--yellow:#ffe600;--green:#39ff14;--bg:#07050f;--grid:#12102a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Press Start 2P',monospace;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 39px,var(--grid) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,var(--grid) 40px);opacity:.22;pointer-events:none;}
h1{font-size:clamp(.9rem,3.5vw,1.6rem);color:var(--cyan);text-shadow:0 0 10px var(--cyan),0 0 30px var(--cyan);letter-spacing:.3em;margin-bottom:.3rem;animation:flicker 5s infinite;}
@keyframes flicker{0%,94%,100%{opacity:1}95%{opacity:.3}96%{opacity:1}98%{opacity:.2}99%{opacity:1}}
.hud{display:flex;gap:1.2rem;margin-bottom:.3rem;font-size:.44rem;letter-spacing:.1em;}
.hi{color:#555;}.hi span{color:var(--yellow);text-shadow:0 0 6px var(--yellow);}
#modeTag{font-size:.36rem;color:#333;letter-spacing:.15em;margin-bottom:.35rem;}
#modeTag span{color:var(--pink);text-shadow:0 0 8px var(--pink);}
#gc{border:2px solid var(--cyan);box-shadow:0 0 18px var(--cyan),0 0 50px rgba(0,255,231,.12);display:block;cursor:none;}
.wrap{position:relative;display:flex;align-items:center;justify-content:center;}
.panel{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:.85rem;background:rgba(7,5,15,.96);z-index:10;pointer-events:all;}
.panel.show{display:flex;}
.ptitle{font-size:clamp(.5rem,2vw,.82rem);color:var(--pink);text-shadow:0 0 12px var(--pink);text-align:center;line-height:2;}
.bignum{font-size:clamp(1.3rem,5vw,2.8rem);color:var(--yellow);text-shadow:0 0 20px var(--yellow);}
.rbadge{font-size:.38rem;color:var(--yellow);text-shadow:0 0 10px var(--yellow);letter-spacing:.2em;}
.btn{font-family:'Press Start 2P',monospace;font-size:.52rem;padding:.6rem 1.3rem;background:transparent;border:2px solid var(--cyan);color:var(--cyan);text-shadow:0 0 8px var(--cyan);cursor:pointer;letter-spacing:.12em;transition:all .15s;}
.btn:hover,.btn:active{background:var(--cyan);color:var(--bg);text-shadow:none;box-shadow:0 0 25px var(--cyan);}
.btn.pk{border-color:var(--pink);color:var(--pink);text-shadow:0 0 8px var(--pink);}
.btn.pk:hover{background:var(--pink);color:var(--bg);}
.brow{display:flex;gap:.65rem;flex-wrap:wrap;justify-content:center;}
.mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;padding:0 .7rem;width:100%;}
.mcard{display:flex;flex-direction:column;align-items:center;gap:.45rem;padding:.65rem .35rem;border:2px solid #1a1a1a;cursor:pointer;transition:all .15s;}
.micon{font-size:1.3rem;}
.mname{font-size:.32rem;letter-spacing:.08em;text-align:center;}
.mdesc{font-size:.26rem;color:#444;text-align:center;line-height:1.9;}
.mbest{font-size:.26rem;color:var(--yellow);}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:.55rem;padding:0 .7rem;}
.scard{display:flex;flex-direction:column;align-items:center;gap:.32rem;padding:.5rem;border:2px solid transparent;cursor:pointer;transition:all .15s;position:relative;}
.scard.sel{border-color:var(--cyan);box-shadow:0 0 10px var(--cyan);}
.scard.lk{opacity:.32;cursor:not-allowed;}
.sname{font-size:.28rem;color:#888;letter-spacing:.07em;text-align:center;}
.sreq{font-size:.24rem;color:var(--pink);}
.lkico{position:absolute;top:3px;right:4px;font-size:.55rem;}
#dashBar{width:100%;height:4px;background:#0d0d1a;margin-top:.28rem;border:1px solid #1a1a2e;}
#dashFill{height:100%;width:100%;background:var(--cyan);transition:width .05s;box-shadow:0 0 5px var(--cyan);}
#timerBar{width:100%;height:5px;background:#1a0010;margin-top:.28rem;border:1px solid #2a0018;display:none;}
#timerFill{height:100%;width:100%;background:var(--pink);transition:width .08s;box-shadow:0 0 8px var(--pink);}
#sndBtn{position:fixed;top:10px;right:12px;font-family:'Press Start 2P',monospace;font-size:.42rem;background:transparent;border:1px solid #2a2a2a;color:#444;padding:.32rem .5rem;cursor:pointer;z-index:30;transition:all .15s;}
#sndBtn.on{color:var(--cyan);border-color:var(--cyan);}
.hint{font-size:.35rem;color:#2a2a2a;letter-spacing:.07em;text-align:center;line-height:2.3;}
.sep{width:78%;height:1px;background:#141428;}
</style>
</head>
<body>
<button id="sndBtn" class="on" onclick="toggleSnd()">♪ ON</button>
<h1>VOID RUNNER</h1>
<div class="hud">
  <div class="hi">SCORE <span id="sd">0</span></div>
  <div class="hi">BEST <span id="bd">0</span></div>
  <div class="hi" id="xhud">NIVEL <span id="ld">1</span></div>
</div>
<div id="modeTag">MODO: <span id="mn">—</span></div>
<div id="dashBar"><div id="dashFill"></div></div>
<div id="timerBar"><div id="timerFill"></div></div>

<div class="wrap">
<canvas id="gc"></canvas>

<!-- MENU -->
<div class="panel show" id="menuPanel">
  <div class="ptitle">VOID RUNNER</div>
  <div class="sep"></div>
  <div style="font-size:.35rem;color:#333;letter-spacing:.12em;">— ELIGE MODO —</div>
  <div class="mgrid" id="modeGrid"></div>
  <div class="sep"></div>
  <div class="brow">
    <button class="btn pk" onclick="openSkins()">SKINS</button>
  </div>
  <div class="hint">MOUSE/TOUCH · DASH: clic, tap o ESPACIO</div>
</div>

<!-- COUNTDOWN -->
<div class="panel" id="cdPanel">
  <div class="bignum" id="cdN">3</div>
</div>

<!-- GAME OVER -->
<div class="panel" id="goPanel">
  <div class="ptitle" id="goT">— GAME OVER —</div>
  <div class="bignum" id="goS">0</div>
  <div class="rbadge" id="rb" style="display:none">✦ NUEVO RÉCORD ✦</div>
  <div class="brow">
    <button class="btn" onclick="retry()">REINTENTAR</button>
    <button class="btn pk" onclick="goMenu()">MENÚ</button>
  </div>
</div>

<!-- SKINS -->
<div class="panel" id="skinPanel">
  <div style="font-size:.58rem;color:var(--cyan);text-shadow:0 0 10px var(--cyan);letter-spacing:.18em;">— SKINS —</div>
  <div class="sgrid" id="skinsGrid"></div>
  <button class="btn" style="font-size:.46rem" onclick="closeSkins()">VOLVER</button>
</div>
</div>

<script>
// ── AUDIO ──────────────────────────────────
let AC=null,sndOn=true;
function ac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function tone(f,t,d,v=.12,sw){
  if(!sndOn)return;
  try{const o=ac().createOscillator(),g=ac().createGain();
  o.connect(g);g.connect(ac().destination);o.type=t;o.frequency.value=f;
  if(sw)o.frequency.linearRampToValueAtTime(sw,ac().currentTime+d);
  g.gain.setValueAtTime(v,ac().currentTime);g.gain.exponentialRampToValueAtTime(.001,ac().currentTime+d);
  o.start();o.stop(ac().currentTime+d);}catch(e){}
}
const sfx={
  score:()=>{tone(523,'square',.07,.07);setTimeout(()=>tone(659,'square',.07,.07),70);},
  lvlup:()=>[523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone(f,'square',.1,.09),i*75)),
  die:()=>{tone(380,'sawtooth',.14,.18);setTimeout(()=>tone(170,'sawtooth',.22,.18),110);setTimeout(()=>tone(85,'sawtooth',.28,.18),270);},
  dash:()=>tone(880,'sine',.12,.12,1300),
  select:()=>tone(660,'sine',.08,.08),
  locked:()=>tone(130,'sawtooth',.1,.12),
  powerup:()=>{[880,1100,1320].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.12,.14),i*95));},
  tick:()=>tone(1046,'square',.05,.09),
};
function toggleSnd(){sndOn=!sndOn;const b=document.getElementById('sndBtn');b.textContent=sndOn?'♪ ON':'♪ OFF';b.className=sndOn?'on':'';}

// ── CANVAS ─────────────────────────────────
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
const W=Math.min(window.innerWidth-34,480);
const H=Math.min(window.innerHeight-195,640);
canvas.width=W; canvas.height=H;

// ── SKINS ──────────────────────────────────
const SKINS=[
  {id:'cyber',name:'CYBER',req:0,color:'#00ffe7',trail:'#00ffe7',
   draw(c,x,y,r,p,f){
     c.strokeStyle='rgba(0,255,231,.22)';c.lineWidth=2;c.beginPath();c.arc(x,y,r*p*1.7,0,Math.PI*2);c.stroke();
     c.fillStyle='#00ffe7';c.shadowColor='#00ffe7';c.shadowBlur=22;c.beginPath();c.arc(x,y,r*p,0,Math.PI*2);c.fill();
     c.fillStyle='#fff';c.shadowBlur=4;c.beginPath();c.arc(x,y,3,0,Math.PI*2);c.fill();}},
  {id:'fire',name:'FUEGO',req:30,color:'#ff6a00',trail:'#ff4400',
   draw(c,x,y,r,p,f){
     for(let i=0;i<6;i++){const a=(Math.PI*2/6)*i+f*.08,px=x+Math.cos(a)*r*1.4,py=y+Math.sin(a)*r*1.4;
       c.fillStyle=i%2?'#ffe600':'#ff6a00';c.shadowColor='#ff6a00';c.shadowBlur=14;c.beginPath();c.arc(px,py,2.5,0,Math.PI*2);c.fill();}
     c.fillStyle='#ff6a00';c.shadowColor='#ff6a00';c.shadowBlur=28;c.beginPath();c.arc(x,y,r*p,0,Math.PI*2);c.fill();
     c.fillStyle='rgba(255,255,200,.55)';c.beginPath();c.arc(x-2,y-2,3,0,Math.PI*2);c.fill();}},
  {id:'ghost',name:'FANTASMA',req:60,color:'#b388ff',trail:'#7c4dff',
   draw(c,x,y,r,p,f){
     c.globalAlpha=.48+.2*Math.sin(f*.1);c.fillStyle='#b388ff';c.shadowColor='#b388ff';c.shadowBlur=30;
     c.beginPath();c.arc(x,y,r*p*1.2,0,Math.PI*2);c.fill();
     for(let i=1;i<=3;i++){c.globalAlpha=.11*(4-i)*Math.sin(f*.05+i);c.beginPath();c.arc(x,y+i*4,r*.55,0,Math.PI*2);c.fill();}
     c.globalAlpha=1;c.fillStyle='#1a0040';c.shadowBlur=0;
     c.beginPath();c.arc(x-3,y-1,2,0,Math.PI*2);c.fill();c.beginPath();c.arc(x+3,y-1,2,0,Math.PI*2);c.fill();}},
  {id:'star',name:'ESTRELLA',req:100,color:'#ffe600',trail:'#ffaa00',
   draw(c,x,y,r,p,f){
     c.fillStyle='#ffe600';c.shadowColor='#ffe600';c.shadowBlur=22;c.beginPath();
     for(let i=0;i<10;i++){const a=(Math.PI/5)*i-Math.PI/2+f*.04,rad=i%2===0?r*p*1.4:r*p*.5;
       const px=x+Math.cos(a)*rad,py=y+Math.sin(a)*rad;i===0?c.moveTo(px,py):c.lineTo(px,py);}
     c.closePath();c.fill();c.fillStyle='rgba(255,255,200,.65)';c.beginPath();c.arc(x,y,3,0,Math.PI*2);c.fill();}},
  {id:'ice',name:'HIELO',req:150,color:'#80d8ff',trail:'#40c4ff',
   draw(c,x,y,r,p,f){
     c.strokeStyle='#80d8ff';c.lineWidth=1.5;c.shadowColor='#80d8ff';c.shadowBlur=18;
     for(let i=0;i<6;i++){const a=(Math.PI/3)*i+f*.02;
       c.beginPath();c.moveTo(x,y);c.lineTo(x+Math.cos(a)*r*p*1.5,y+Math.sin(a)*r*p*1.5);c.stroke();
       const bx=x+Math.cos(a)*r*.7,by=y+Math.sin(a)*r*.7;
       c.beginPath();c.moveTo(bx+Math.cos(a+Math.PI/2)*4,by+Math.sin(a+Math.PI/2)*4);
       c.lineTo(bx-Math.cos(a+Math.PI/2)*4,by-Math.sin(a+Math.PI/2)*4);c.stroke();}
     c.fillStyle='#80d8ff';c.beginPath();c.arc(x,y,3.5,0,Math.PI*2);c.fill();}},
  {id:'void',name:'?? VOID',req:250,color:'#ff2d78',trail:'#ff2d78',
   draw(c,x,y,r,p,f){
     const g=c.createRadialGradient(x,y,0,x,y,r*p*2.2);
     g.addColorStop(0,'#000');g.addColorStop(.5,'#3d0020');g.addColorStop(1,'transparent');
     c.fillStyle=g;c.beginPath();c.arc(x,y,r*p*2.2,0,Math.PI*2);c.fill();
     for(let i=0;i<3;i++){c.strokeStyle=`rgba(255,45,120,${.6-i*.15})`;c.lineWidth=1;c.shadowColor='#ff2d78';c.shadowBlur=14;
       c.beginPath();c.ellipse(x,y,r*p*(1+i*.5),r*p*(.4+i*.2),f*(.03+i*.02),0,Math.PI*2);c.stroke();}
     c.fillStyle='#000';c.shadowBlur=0;c.beginPath();c.arc(x,y,r*.5,0,Math.PI*2);c.fill();}},
];
let skinId=localStorage.getItem('vr_skin')||'cyber';
let unlocked=JSON.parse(localStorage.getItem('vr_unlocked')||'["cyber"]');
const getSkin=()=>SKINS.find(s=>s.id===skinId)||SKINS[0];

// ── MODES ──────────────────────────────────
const MODES={
  survival:{id:'survival',label:'SURVIVAL',icon:'🌀',desc:'Sobrevive lo\nmás posible.',color:'#00ffe7',bk:'vr_bs'},
  blitz:   {id:'blitz',   label:'BLITZ',   icon:'⚡',desc:'60 segundos.\nMáx puntuación.',color:'#ffe600',bk:'vr_bb',time:60},
  zen:     {id:'zen',     label:'ZEN',     icon:'🌊',desc:'Velocidad fija.\nRelajado y letal.',color:'#39ff14',bk:'vr_bz'},
};
const getBest=m=>parseInt(localStorage.getItem(MODES[m].bk)||'0');
const setBest=(m,v)=>localStorage.setItem(MODES[m].bk,v);

// ── STATE ──────────────────────────────────
let gState='menu'; // menu|countdown|playing|dead
let curMode='survival';
let score=0,frame=0,level=1,lastLevel=1,lastMS=0;
let timeLeft=60,animId=null;
let shakeX=0,shakeY=0,shakeMag=0;

// ── PLAYER PHYSICS ─────────────────────────
let player={};
let mouseX=W/2,mouseY=H*.75;
let dashCD=0,dashMax=110,dashing=false,dashT=0,dashAngle=0;
const DASH_DUR=11,DASH_F=17;

function initPlayer(){
  player={x:W/2,y:H*.75,r:10,vx:0,vy:0,invincible:0};
  mouseX=W/2;mouseY=H*.75;dashCD=0;dashing=false;dashT=0;
}

function updatePlayer(){
  const dx=mouseX-player.x,dy=mouseY-player.y;
  const dist=Math.sqrt(dx*dx+dy*dy);

  if(dashing){
    dashT--;
    player.vx=Math.cos(dashAngle)*DASH_F;
    player.vy=Math.sin(dashAngle)*DASH_F;
    player.invincible=Math.max(player.invincible,dashT+3);
    if(dashT<=0) dashing=false;
  } else {
    if(dist>2){
      const force=Math.min(dist*.048,1.7);
      player.vx=(player.vx+(dx/dist)*force)*.83;
      player.vy=(player.vy+(dy/dist)*force)*.83;
    } else {
      player.vx*=.75; player.vy*=.75;
    }
  }

  // Speed cap
  const spd=Math.sqrt(player.vx*player.vx+player.vy*player.vy);
  if(spd>12){player.vx=player.vx/spd*12;player.vy=player.vy/spd*12;}

  player.x+=player.vx; player.y+=player.vy;

  // Elastic wall bounce
  if(player.x<player.r){player.x=player.r;player.vx=Math.abs(player.vx)*.55;}
  if(player.x>W-player.r){player.x=W-player.r;player.vx=-Math.abs(player.vx)*.55;}
  if(player.y<player.r){player.y=player.r;player.vy=Math.abs(player.vy)*.55;}
  if(player.y>H-player.r){player.y=H-player.r;player.vy=-Math.abs(player.vy)*.55;}

  if(player.invincible>0) player.invincible--;
  if(dashCD>0) dashCD--;

  document.getElementById('dashFill').style.width=((1-dashCD/dashMax)*100)+'%';
}

function triggerDash(){
  if(dashCD>0||dashing) return;
  sfx.dash(); dashing=true; dashT=DASH_DUR; dashCD=dashMax;
  const dx=mouseX-player.x,dy=mouseY-player.y,d=Math.sqrt(dx*dx+dy*dy)||1;
  dashAngle=Math.atan2(dy,dx);
  burst(player.x,player.y,getSkin().color,8);
}

// ── OBSTACLES ──────────────────────────────
let obstacles=[];

function bspd(){
  if(curMode==='zen') return 2.6+Math.random()*.4;
  return 2+level*.5+Math.random()*1.3;
}

function spawnObs(){
  const spd=bspd(), roll=Math.random();
  if(roll<.28){
    // Wall with gap
    const gap=72+Math.random()*70,gx=30+Math.random()*(W-60-gap);
    obstacles.push({type:'bar',x:0,y:-14,w:gx,h:13,speed:spd,color:'#ff2d78'});
    obstacles.push({type:'bar',x:gx+gap,y:-14,w:W-gx-gap,h:13,speed:spd,color:'#ff2d78'});
  } else if(roll<.52){
    // Bouncing orbs
    const n=2+Math.floor(Math.random()*3);
    for(let i=0;i<n;i++)
      obstacles.push({type:'orb',x:20+Math.random()*(W-40),y:-20,r:9,speed:spd,vx:(Math.random()-.5)*3.2,color:'#ffe600',bounces:0});
  } else if(roll<.68){
    // Fast laser
    obstacles.push({type:'bar',x:0,y:-8,w:W,h:7,speed:spd*1.45,color:'#ff2d78'});
  } else if(roll<.83){
    // Sideways drifter
    const fl=Math.random()>.5;
    obstacles.push({type:'drifter',x:fl?-20:W+20,y:Math.random()*H*.45,r:11,speed:0,vx:fl?3.2:-3.2,vy:spd,color:'#b388ff'});
  } else {
    // Bullet column
    const n=3+Math.floor(Math.random()*4);
    for(let i=0;i<n;i++)
      obstacles.push({type:'bullet',x:28+Math.random()*(W-56),y:-22-i*22,r:6,speed:spd*1.2,color:'#00ffe7'});
  }
}

// ── PARTICLES ──────────────────────────────
let particles=[];

function burst(x,y,color,n=14){
  for(let i=0;i<n;i++){
    const a=(Math.PI*2*i)/n+Math.random()*.5,spd=1.5+Math.random()*4.5;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,decay:.03+Math.random()*.04,r:2+Math.random()*3.5,color,g:true});
  }
}
function emitTrail(x,y){
  particles.push({x,y,vx:(Math.random()-.5)*.4,vy:Math.random()*.3,life:.6,decay:.058,r:2.5+Math.random()*2,color:getSkin().trail,trail:true});
}
function emitDash(x,y){
  particles.push({x,y,vx:(Math.random()-.5)*1.8,vy:(Math.random()-.5)*1.8,life:.75,decay:.07,r:4+Math.random()*4,color:getSkin().color,trail:true});
}

// ── STARS ──────────────────────────────────
let stars=[];
function initStars(){
  stars=Array.from({length:90},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.6,spd:.2+Math.random()*.6,a:Math.random()}));
}

// ── COLLISION ──────────────────────────────
function crect(cx,cy,cr,rx,ry,rw,rh){
  const nx=Math.max(rx,Math.min(cx,rx+rw)),ny=Math.max(ry,Math.min(cy,ry+rh));
  const dx=cx-nx,dy=cy-ny;return dx*dx+dy*dy<cr*cr;
}

// ── HUD ────────────────────────────────────
function updateHUD(){
  document.getElementById('sd').textContent=Math.floor(score);
  document.getElementById('bd').textContent=getBest(curMode);
  if(curMode==='blitz'){
    document.getElementById('xhud').innerHTML='TIEMPO <span id="ld">'+Math.ceil(timeLeft)+'s</span>';
  } else {
    document.getElementById('xhud').innerHTML='NIVEL <span id="ld">'+level+'</span>';
  }
}

// ── UPDATE ─────────────────────────────────
function update(){
  frame++;
  score+=curMode==='blitz'?.08:.05;
  if(curMode!=='zen') level=1+Math.floor(score/20);
  if(level>lastLevel){sfx.lvlup();lastLevel=level;}
  const ms=Math.floor(score/10);
  if(ms>lastMS&&score>5){sfx.score();lastMS=ms;checkUnlocks(Math.floor(score));}
  updateHUD();

  // Blitz timer
  if(curMode==='blitz'){
    timeLeft-=1/60;
    document.getElementById('timerFill').style.width=(Math.max(0,timeLeft/MODES.blitz.time)*100)+'%';
    if(timeLeft<=10&&Math.floor(timeLeft)!==Math.floor(timeLeft+1/60)) sfx.tick();
    if(timeLeft<=0){timeLeft=0;endGame();return;}
  }

  // Stars
  const sv=curMode==='zen'?.28:1;
  stars.forEach(s=>{s.y+=s.spd*sv;if(s.y>H){s.y=0;s.x=Math.random()*W;}});

  updatePlayer();
  if(frame%2===0){dashing?emitDash(player.x,player.y):emitTrail(player.x,player.y);}

  const spawnRate=curMode==='zen'?72:Math.max(21,60-level*4);
  if(frame%spawnRate===0) spawnObs();

  // Move obstacles
  obstacles.forEach(o=>{
    o.y+=o.speed;
    if(o.type==='orb'){o.x+=o.vx;if(o.x<o.r||o.x>W-o.r){o.vx*=-1;o.bounces++;if(o.bounces>5)o.y=H+100;}}
    if(o.type==='drifter') o.x+=o.vx;
  });
  obstacles=obstacles.filter(o=>{
    if(o.type==='drifter') return o.y<H+50&&o.x>-60&&o.x<W+60;
    return o.y<H+65;
  });

  // Collision
  if(player.invincible<=0){
    for(const o of obstacles){
      let hit=false;
      if(o.type==='bar') hit=crect(player.x,player.y,player.r-2,o.x,o.y,o.w,o.h);
      else{const dx=player.x-o.x,dy=player.y-o.y;hit=dx*dx+dy*dy<(player.r+o.r-2)**2;}
      if(hit){
        sfx.die();shakeMag=11;
        burst(player.x,player.y,getSkin().color,22);
        burst(player.x,player.y,'#ff2d78',12);
        checkUnlocks(Math.floor(score));endGame();return;
      }
    }
  }

  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;if(p.g)p.vy+=.08;});
  particles=particles.filter(p=>p.life>0);
  shakeMag*=.8;shakeX=shakeMag*(Math.random()-.5)*2;shakeY=shakeMag*(Math.random()-.5)*2;
}

// ── DRAW ───────────────────────────────────
function hexRgb(h){return `${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`;}

function draw(){
  ctx.save();ctx.translate(shakeX,shakeY);
  ctx.fillStyle='rgba(7,5,15,.86)';ctx.fillRect(-6,-6,W+12,H+12);
  // Mode tint
  ctx.fillStyle=`rgba(${hexRgb(MODES[curMode].color)},.01)`;ctx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s=>{ctx.save();ctx.globalAlpha=s.a*.72;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();ctx.restore();});

  // Particles
  particles.forEach(p=>{
    ctx.save();ctx.globalAlpha=p.life*(p.trail?.38:.88);
    ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=p.trail?5:12;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*(p.trail?.78:1),0,Math.PI*2);ctx.fill();ctx.restore();
  });

  // Obstacles
  obstacles.forEach(o=>{
    ctx.save();ctx.shadowColor=o.color;ctx.shadowBlur=14;ctx.fillStyle=o.color;
    if(o.type==='bar'){ctx.fillRect(o.x,o.y,o.w,o.h);ctx.fillStyle='rgba(255,255,255,.16)';ctx.fillRect(o.x+2,o.y+2,o.w-4,3);}
    else{ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fill();
      if(o.type==='orb'){ctx.strokeStyle='rgba(255,255,255,.28)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.stroke();}}
    ctx.restore();
  });

  // Player
  if(player.invincible<=0||(frame%4<2)){
    const pulse=1+.08*Math.sin(frame*.15);
    ctx.save();if(dashing)ctx.globalAlpha=.65+.3*Math.sin(frame*.4);
    getSkin().draw(ctx,player.x,player.y,player.r,pulse,frame);ctx.restore();
  }

  // Dash hint arrow
  if(dashCD===0&&!dashing){
    const dx=mouseX-player.x,dy=mouseY-player.y,d=Math.sqrt(dx*dx+dy*dy)||1;
    if(d>22){
      ctx.save();ctx.globalAlpha=.13;ctx.strokeStyle=getSkin().color;ctx.lineWidth=1;ctx.setLineDash([4,7]);
      ctx.beginPath();ctx.moveTo(player.x,player.y);ctx.lineTo(player.x+(dx/d)*38,player.y+(dy/d)*38);ctx.stroke();ctx.restore();
    }
  }

  // Blitz urgent flash
  if(curMode==='blitz'&&timeLeft<=10&&frame%9<4){ctx.save();ctx.globalAlpha=.07;ctx.fillStyle='#ff2d78';ctx.fillRect(0,0,W,H);ctx.restore();}

  ctx.restore();
}

// ── LOOP ───────────────────────────────────
function loop(){if(gState!=='playing')return;update();draw();animId=requestAnimationFrame(loop);}

// ── PANELS ─────────────────────────────────
const showP=id=>document.getElementById(id).classList.add('show');
const hideP=id=>document.getElementById(id).classList.remove('show');

function selectMode(modeId){
  sfx.select();ac();curMode=modeId;
  document.getElementById('mn').textContent=MODES[modeId].label;
  countdown();
}

function countdown(){
  gState='countdown';showP('cdPanel');
  let n=3;document.getElementById('cdN').textContent=n;sfx.tick();
  const iv=setInterval(()=>{
    n--;
    if(n>0){document.getElementById('cdN').textContent=n;sfx.tick();}
    else{clearInterval(iv);document.getElementById('cdN').textContent='GO!';setTimeout(()=>{hideP('cdPanel');beginPlay();},400);}
  },800);
}

function beginPlay(){
  score=0;frame=0;level=1;lastLevel=1;lastMS=0;
  obstacles=[];particles=[];timeLeft=MODES.blitz.time;
  initPlayer();initStars();
  const tb=document.getElementById('timerBar');
  tb.style.display=curMode==='blitz'?'block':'none';
  if(curMode==='blitz')document.getElementById('timerFill').style.width='100%';
  updateHUD();gState='playing';loop();
}

function endGame(){
  gState='dead';cancelAnimationFrame(animId);draw();
  const s=Math.floor(score),isNew=s>getBest(curMode);
  if(isNew)setBest(curMode,s);
  document.getElementById('bd').textContent=getBest(curMode);
  document.getElementById('goT').textContent=curMode==='blitz'&&timeLeft<=0?'— TIEMPO —':'— GAME OVER —';
  document.getElementById('goS').textContent=s;
  document.getElementById('rb').style.display=isNew?'block':'none';
  showP('goPanel');
}

function retry(){sfx.select();hideP('goPanel');countdown();}
function goMenu(){sfx.select();hideP('goPanel');buildModesUI();showP('menuPanel');}
function openSkins(){sfx.select();buildSkinsUI();hideP('menuPanel');showP('skinPanel');}
function closeSkins(){sfx.select();hideP('skinPanel');showP('menuPanel');}

// ── UNLOCKS ────────────────────────────────
function checkUnlocks(s){
  let ch=false;
  SKINS.forEach(sk=>{if(s>=sk.req&&!unlocked.includes(sk.id)){unlocked.push(sk.id);ch=true;unlockFlash(sk.name);}});
  if(ch)localStorage.setItem('vr_unlocked',JSON.stringify(unlocked));
}
function unlockFlash(name){
  const el=document.createElement('div');
  el.style.cssText='position:fixed;top:22%;left:50%;transform:translateX(-50%);font-family:"Press Start 2P",monospace;font-size:.48rem;color:#ffe600;text-shadow:0 0 14px #ffe600;background:rgba(7,5,15,.95);border:2px solid #ffe600;padding:.65rem 1.3rem;z-index:99;text-align:center;line-height:2;animation:fu 2.5s forwards;pointer-events:none;';
  el.innerHTML='✦ SKIN DESBLOQUEADA ✦<br>'+name;
  const st=document.createElement('style');
  st.textContent='@keyframes fu{0%{opacity:1;top:22%}80%{opacity:1}100%{opacity:0;top:16%}}';
  document.head.appendChild(st);document.body.appendChild(el);
  setTimeout(()=>el.remove(),2600);sfx.powerup();
}

// ── SKINS UI ───────────────────────────────
function buildSkinsUI(){
  const grid=document.getElementById('skinsGrid');grid.innerHTML='';
  SKINS.forEach(sk=>{
    const isU=unlocked.includes(sk.id),isSel=sk.id===skinId;
    const card=document.createElement('div');card.className='scard'+(isSel?' sel':'')+(isU?'':' lk');
    const cv=document.createElement('canvas');cv.width=48;cv.height=48;
    const cx=cv.getContext('2d');cx.fillStyle='#07050f';cx.fillRect(0,0,48,48);
    if(isU){cx.save();sk.draw(cx,24,24,9,1,30);cx.restore();}
    else{cx.fillStyle='#1a1a1a';cx.beginPath();cx.arc(24,24,9,0,Math.PI*2);cx.fill();}
    const nm=document.createElement('div');nm.className='sname';nm.textContent=sk.name;
    const rq=document.createElement('div');rq.className='sreq';rq.textContent=sk.req===0?'GRATIS':'≥'+sk.req;
    if(!isU){const li=document.createElement('div');li.className='lkico';li.textContent='🔒';card.appendChild(li);}
    card.appendChild(cv);card.appendChild(nm);card.appendChild(rq);
    card.onclick=()=>{if(!isU){sfx.locked();return;}sfx.select();skinId=sk.id;localStorage.setItem('vr_skin',skinId);buildSkinsUI();};
    grid.appendChild(card);
  });
}

// ── MODES UI ───────────────────────────────
function buildModesUI(){
  const grid=document.getElementById('modeGrid');grid.innerHTML='';
  Object.values(MODES).forEach(m=>{
    const card=document.createElement('div');card.className='mcard';
    card.style.borderColor=m.color+'44';
    card.innerHTML=`<div class="micon">${m.icon}</div><div class="mname" style="color:${m.color};text-shadow:0 0 8px ${m.color}">${m.label}</div><div class="mdesc">${m.desc.replace('\n','<br>')}</div><div class="mbest">BEST: ${getBest(m.id)}</div>`;
    card.onmouseenter=()=>{card.style.borderColor=m.color;card.style.boxShadow=`0 0 14px ${m.color}44`;};
    card.onmouseleave=()=>{card.style.borderColor=m.color+'44';card.style.boxShadow='none';};
    card.onclick=()=>selectMode(m.id);
    grid.appendChild(card);
  });
}

// ── INPUT ──────────────────────────────────
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();mouseX=e.clientX-r.left;mouseY=e.clientY-r.top;});
canvas.addEventListener('mousedown',e=>{if(gState==='playing')triggerDash();});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const r=canvas.getBoundingClientRect();mouseX=e.touches[0].clientX-r.left;mouseY=e.touches[0].clientY-r.top;},{passive:false});
canvas.addEventListener('touchstart',e=>{const r=canvas.getBoundingClientRect();mouseX=e.touches[0].clientX-r.left;mouseY=e.touches[0].clientY-r.top;if(gState==='playing')triggerDash();});
window.addEventListener('keydown',e=>{if(e.code==='Space'&&gState==='playing'){e.preventDefault();triggerDash();}});

// ── IDLE ───────────────────────────────────
initStars();player={x:W/2,y:H*.75,r:10,vx:0,vy:0};obstacles=[];particles=[];
function idleLoop(){
  if(gState!=='menu')return;frame++;
  stars.forEach(s=>{s.y+=s.spd*.32;if(s.y>H){s.y=0;s.x=Math.random()*W;}});
  if(frame%3===0)emitTrail(W/2+Math.sin(frame*.03)*72,H*.72+Math.cos(frame*.02)*36);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;});particles=particles.filter(p=>p.life>0);
  ctx.fillStyle='rgba(7,5,15,.82)';ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{ctx.save();ctx.globalAlpha=s.a*.48;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();ctx.restore();});
  particles.forEach(p=>{ctx.save();ctx.globalAlpha=p.life*.33;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=5;ctx.beginPath();ctx.arc(p.x,p.y,p.r*.7,0,Math.PI*2);ctx.fill();ctx.restore();});
  const ix=W/2+Math.sin(frame*.03)*72,iy=H*.72+Math.cos(frame*.02)*36;
  player.x=ix;player.y=iy;
  ctx.save();getSkin().draw(ctx,ix,iy,10,1+.1*Math.sin(frame*.1),frame);ctx.restore();
  requestAnimationFrame(idleLoop);
}
buildModesUI();idleLoop();

// refresh bests on menu open
new MutationObserver(()=>{if(document.getElementById('menuPanel').classList.contains('show'))buildModesUI();})
  .observe(document.getElementById('menuPanel'),{attributes:true,attributeFilter:['class']});
</script>
