<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID RUNNER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
:root{--c:#00ffe7;--p:#ff2d78;--y:#ffe600;--g:#39ff14;--bg:#07050f;--grid:#12102a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Press Start 2P',monospace;overflow:hidden;user-select:none;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 39px,var(--grid) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,var(--grid) 40px);opacity:.15;pointer-events:none;}

#title{font-size:clamp(1.1rem,4vw,1.9rem);color:var(--c);text-shadow:0 0 12px var(--c),0 0 35px var(--c);letter-spacing:.25em;margin-bottom:.4rem;animation:flicker 5s infinite;}
@keyframes flicker{0%,93%,100%{opacity:1}94%{opacity:.3}95%{opacity:1}97%{opacity:.15}98%{opacity:1}}

#hud{display:flex;gap:1.4rem;margin-bottom:.3rem;font-size:.65rem;letter-spacing:.1em;}
.hi{color:#555;}.hi b{color:var(--y);text-shadow:0 0 8px var(--y);font-weight:normal;}
#modeTag{font-size:.55rem;color:#444;letter-spacing:.15em;margin-bottom:.25rem;}
#modeTag b{color:var(--p);text-shadow:0 0 10px var(--p);}

#dashBar,#timerBar{width:100%;height:5px;margin-top:.25rem;}
#dashBar{background:#0d0d1a;border:1px solid #1a1a30;}
#dashFill{height:100%;width:100%;background:var(--c);box-shadow:0 0 6px var(--c);transition:width .05s;}
#timerBar{background:#1a0010;border:1px solid #2a0018;display:none;}
#timerFill{height:100%;background:var(--p);box-shadow:0 0 8px var(--p);transition:width .08s;}

#gc{border:2px solid var(--c);box-shadow:0 0 20px var(--c),0 0 55px rgba(0,255,231,.1);display:block;cursor:none;}
.wrap{position:relative;display:flex;align-items:center;justify-content:center;}

.panel{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:.9rem;background:rgba(7,5,15,.97);z-index:10;pointer-events:all;overflow-y:auto;padding:.5rem 0;}
.panel.show{display:flex;}

.ptitle{font-size:clamp(.7rem,2.5vw,1.1rem);color:var(--p);text-shadow:0 0 14px var(--p);text-align:center;line-height:2;}
.bignum{font-size:clamp(1.6rem,6vw,3rem);color:var(--y);text-shadow:0 0 22px var(--y);}
.rbadge{font-size:.55rem;color:var(--y);text-shadow:0 0 10px var(--y);letter-spacing:.2em;}
.hint{font-size:.5rem;color:#333;letter-spacing:.07em;text-align:center;line-height:2.2;}
.sep{width:80%;height:1px;background:#141428;flex-shrink:0;}
.lbl{font-size:.48rem;color:#333;letter-spacing:.14em;}

.btn{font-family:'Press Start 2P',monospace;font-size:.62rem;padding:.65rem 1.4rem;background:transparent;border:2px solid var(--c);color:var(--c);text-shadow:0 0 8px var(--c);cursor:pointer;letter-spacing:.12em;transition:all .15s;}
.btn:hover,.btn:active{background:var(--c);color:var(--bg);text-shadow:none;box-shadow:0 0 28px var(--c);}
.btn.pk{border-color:var(--p);color:var(--p);text-shadow:0 0 8px var(--p);}
.btn.pk:hover,.btn.pk:active{background:var(--p);color:var(--bg);}
.brow{display:flex;gap:.7rem;flex-wrap:wrap;justify-content:center;}

.mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;padding:0 .75rem;width:100%;}
.mcard{display:flex;flex-direction:column;align-items:center;gap:.5rem;padding:.75rem .4rem;border:2px solid #1c1c28;cursor:pointer;transition:all .18s;}
.mcard:hover{transform:translateY(-2px);}
.micon{font-size:1.5rem;}
.mname{font-size:.4rem;letter-spacing:.08em;text-align:center;}
.mdesc{font-size:.32rem;color:#444;text-align:center;line-height:2;}
.mbest{font-size:.32rem;color:var(--y);}

/* 4 cols para 10 skins */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;padding:0 .6rem;width:100%;}
.scard{display:flex;flex-direction:column;align-items:center;gap:.28rem;padding:.45rem .25rem;border:2px solid transparent;cursor:pointer;transition:all .15s;position:relative;}
.scard.sel{border-color:var(--c);box-shadow:0 0 12px var(--c);}
.scard.lk{opacity:.3;cursor:not-allowed;}
.scard canvas{display:block;}
.sname{font-size:.28rem;color:#999;letter-spacing:.06em;text-align:center;}
.sreq{font-size:.24rem;color:var(--p);text-align:center;}
.stier{font-size:.22rem;letter-spacing:.04em;text-align:center;}
.lkico{position:absolute;top:2px;right:3px;font-size:.5rem;}

#sndBtn{position:fixed;top:10px;right:12px;font-family:'Press Start 2P',monospace;font-size:.48rem;background:transparent;border:1px solid #252525;color:#444;padding:.32rem .5rem;cursor:pointer;z-index:30;transition:all .15s;}
#sndBtn.on{color:var(--c);border-color:var(--c);}

#cdN{font-size:clamp(3rem,14vw,6rem);color:var(--c);text-shadow:0 0 30px var(--c),0 0 70px var(--c);}
</style>
</head>
<body>

<button id="sndBtn" class="on" onclick="toggleSnd()">♪ ON</button>
<div id="title">VOID RUNNER</div>
<div id="hud">
  <div class="hi">SCORE <b id="sd">0</b></div>
  <div class="hi">BEST <b id="bd">0</b></div>
  <div class="hi" id="xhud">NIVEL <b id="ld">1</b></div>
</div>
<div id="modeTag">MODO: <b id="mn">—</b></div>
<div id="dashBar"><div id="dashFill"></div></div>
<div id="timerBar"><div id="timerFill"></div></div>

<div class="wrap">
<canvas id="gc"></canvas>

<div class="panel show" id="panMenu">
  <div class="ptitle">VOID RUNNER</div>
  <div class="sep"></div>
  <div class="lbl">— ELIGE MODO —</div>
  <div class="mgrid" id="modeGrid"></div>
  <div class="sep"></div>
  <div class="brow"><button class="btn pk" onclick="openSkins()">✦ SKINS</button></div>
  <div class="hint">MOUSE / TOUCH &nbsp;·&nbsp; DASH: clic, tap o ESPACIO</div>
</div>

<div class="panel" id="panCD" style="background:rgba(7,5,15,.92)">
  <div id="cdN">3</div>
</div>

<div class="panel" id="panGO">
  <div class="ptitle" id="goTitle">— GAME OVER —</div>
  <div class="bignum" id="goScore">0</div>
  <div class="rbadge" id="goBadge" style="display:none">✦ NUEVO RÉCORD ✦</div>
  <div class="brow" style="margin-top:.3rem">
    <button class="btn" onclick="retry()">REINTENTAR</button>
    <button class="btn pk" onclick="backMenu()">MENÚ</button>
  </div>
</div>

<div class="panel" id="panSkins" style="gap:.65rem;padding:.7rem 0;">
  <div class="ptitle" style="color:var(--c);text-shadow:0 0 14px var(--c);">— SKINS —</div>
  <div class="sgrid" id="skinGrid"></div>
  <button class="btn" style="font-size:.52rem;margin-top:.3rem" onclick="closeSkins()">VOLVER</button>
</div>

</div>

<script>
'use strict';

// ═══ AUDIO ═══════════════════════════════════
let _ac=null, sndOn=true;
function AC(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;}
function tone(f,t,d,v=.12,sw){
  if(!sndOn)return;
  try{
    const o=AC().createOscillator(),g=AC().createGain();
    o.connect(g);g.connect(AC().destination);
    o.type=t;o.frequency.value=f;
    if(sw)o.frequency.linearRampToValueAtTime(sw,AC().currentTime+d);
    g.gain.setValueAtTime(v,AC().currentTime);
    g.gain.exponentialRampToValueAtTime(.001,AC().currentTime+d);
    o.start();o.stop(AC().currentTime+d);
  }catch(e){}
}
const SFX={
  score : ()=>{tone(523,'square',.07,.07);setTimeout(()=>tone(659,'square',.07,.07),70);},
  lvlup : ()=>[523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone(f,'square',.1,.09),i*80)),
  die   : ()=>{tone(380,'sawtooth',.14,.2);setTimeout(()=>tone(180,'sawtooth',.22,.2),110);setTimeout(()=>tone(80,'sawtooth',.28,.2),270);},
  dash  : ()=>tone(880,'sine',.12,.13,1400),
  select: ()=>tone(660,'sine',.08,.08),
  locked: ()=>tone(120,'sawtooth',.1,.12),
  unlock: ()=>[880,1100,1320,1760].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.13,.15),i*90)),
  tick  : ()=>tone(1046,'square',.05,.1),
  end   : ()=>{[500,400,300,200,100].forEach((f,i)=>setTimeout(()=>tone(f,'sawtooth',.1,.15),i*100));},
};
function toggleSnd(){sndOn=!sndOn;const b=document.getElementById('sndBtn');b.textContent=sndOn?'♪ ON':'♪ OFF';b.className=sndOn?'on':'';}

// ═══ CANVAS ═══════════════════════════════════
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
const W=Math.min(window.innerWidth-30,480);
const H=Math.min(window.innerHeight-210,640);
canvas.width=W; canvas.height=H;

// ═══ SKINS ════════════════════════════════════
// CRÍTICO: cada skin usa ctx.save()/ctx.restore() propio
// y siempre resetea globalAlpha=1 al salir
const SKINS=[
  {id:'cyber',name:'CYBER',req:0,tier:'GRATIS',tc:'#00ffe7',color:'#00ffe7',trail:'#00ffe7',
   draw(c,x,y,r,p,f){
     c.save();
     c.strokeStyle='rgba(0,255,231,.22)';c.lineWidth=2;
     c.beginPath();c.arc(x,y,r*p*1.8,0,Math.PI*2);c.stroke();
     c.fillStyle='#00ffe7';c.shadowColor='#00ffe7';c.shadowBlur=24;
     c.beginPath();c.arc(x,y,r*p,0,Math.PI*2);c.fill();
     c.fillStyle='#fff';c.shadowBlur=5;
     c.beginPath();c.arc(x,y,3.5,0,Math.PI*2);c.fill();
     c.restore();
   }},
  {id:'fire',name:'FUEGO',req:30,tier:'FÁCIL',tc:'#39ff14',color:'#ff6a00',trail:'#ff3300',
   draw(c,x,y,r,p,f){
     c.save();
     for(let i=0;i<8;i++){
       const a=(Math.PI*2/8)*i+f*.07;
       const px=x+Math.cos(a)*r*1.5,py=y+Math.sin(a)*r*1.5;
       c.fillStyle=i%2?'#ffe600':'#ff6a00';c.shadowColor='#ff4400';c.shadowBlur=16;
       c.beginPath();c.arc(px,py,2.5,0,Math.PI*2);c.fill();
     }
     c.fillStyle='#ff6a00';c.shadowColor='#ff6a00';c.shadowBlur=30;
     c.beginPath();c.arc(x,y,r*p,0,Math.PI*2);c.fill();
     c.fillStyle='rgba(255,255,180,.6)';c.shadowBlur=0;
     c.beginPath();c.arc(x-2,y-2,3,0,Math.PI*2);c.fill();
     c.restore();
   }},
  {id:'ghost',name:'FANTASMA',req:70,tier:'FÁCIL',tc:'#39ff14',color:'#b388ff',trail:'#7c4dff',
   draw(c,x,y,r,p,f){
     c.save();
     // cuerpo semi-transparente
     c.globalAlpha=.55+.2*Math.sin(f*.1);
     c.fillStyle='#b388ff';c.shadowColor='#b388ff';c.shadowBlur=32;
     c.beginPath();c.arc(x,y,r*p*1.3,0,Math.PI*2);c.fill();
     // cola
     for(let i=1;i<=3;i++){
       c.globalAlpha=.1*(4-i)*Math.abs(Math.sin(f*.06+i));
       c.beginPath();c.arc(x,y+i*5,r*.55,0,Math.PI*2);c.fill();
     }
     c.restore();
     // ojos SIEMPRE opacos (fuera del bloque semi-transparente)
     c.save();
     c.fillStyle='#110030';c.shadowBlur=0;
     c.beginPath();c.arc(x-3,y-1,2.2,0,Math.PI*2);c.fill();
     c.beginPath();c.arc(x+3,y-1,2.2,0,Math.PI*2);c.fill();
     c.restore();
   }},
  {id:'star',name:'ESTRELLA',req:120,tier:'MEDIO',tc:'#ffe600',color:'#ffe600',trail:'#ffaa00',
   draw(c,x,y,r,p,f){
     c.save();
     c.fillStyle='#ffe600';c.shadowColor='#ffe600';c.shadowBlur=24;
     c.beginPath();
     for(let i=0;i<10;i++){
       const a=(Math.PI/5)*i-Math.PI/2+f*.035;
       const rad=i%2===0?r*p*1.5:r*p*.55;
       i===0?c.moveTo(x+Math.cos(a)*rad,y+Math.sin(a)*rad):c.lineTo(x+Math.cos(a)*rad,y+Math.sin(a)*rad);
     }
     c.closePath();c.fill();
     c.fillStyle='rgba(255,255,200,.7)';c.shadowBlur=0;
     c.beginPath();c.arc(x,y,3.5,0,Math.PI*2);c.fill();
     c.restore();
   }},
  {id:'ice',name:'HIELO',req:180,tier:'MEDIO',tc:'#ffe600',color:'#80d8ff',trail:'#40c4ff',
   draw(c,x,y,r,p,f){
     c.save();
     c.strokeStyle='#80d8ff';c.lineWidth=1.8;c.shadowColor='#80d8ff';c.shadowBlur=20;
     for(let i=0;i<6;i++){
       const a=(Math.PI/3)*i+f*.018;
       c.beginPath();c.moveTo(x,y);c.lineTo(x+Math.cos(a)*r*p*1.6,y+Math.sin(a)*r*p*1.6);c.stroke();
       const bx=x+Math.cos(a)*r*.72,by=y+Math.sin(a)*r*.72;
       c.beginPath();
       c.moveTo(bx+Math.cos(a+Math.PI/2)*5,by+Math.sin(a+Math.PI/2)*5);
       c.lineTo(bx-Math.cos(a+Math.PI/2)*5,by-Math.sin(a+Math.PI/2)*5);
       c.stroke();
     }
     c.fillStyle='#80d8ff';c.shadowBlur=10;
     c.beginPath();c.arc(x,y,4,0,Math.PI*2);c.fill();
     c.restore();
   }},
  {id:'dragon',name:'DRAGON',req:250,tier:'DIFÍCIL',tc:'#ff6a00',color:'#ff4400',trail:'#ff8800',
   draw(c,x,y,r,p,f){
     c.save();
     // Alas
     c.shadowColor='#ff4400';c.shadowBlur=18;
     for(let s=0;s<2;s++){
       const sx=s===0?-1:1;
       c.fillStyle=s===0?'rgba(255,68,0,.7)':'rgba(255,136,0,.65)';
       c.beginPath();
       c.moveTo(x,y);
       c.bezierCurveTo(x+sx*r*2.2,y-r*1.6,x+sx*r*3.2,y+r*.4,x+sx*r*1.6,y+r);
       c.closePath();c.fill();
     }
     // Cuerpo
     c.fillStyle='#ff4400';c.shadowBlur=28;
     c.beginPath();c.arc(x,y,r*p,0,Math.PI*2);c.fill();
     // Ojos
     c.fillStyle='#ffe600';c.shadowBlur=8;
     c.beginPath();c.arc(x-3,y-2,2.5,0,Math.PI*2);c.fill();
     c.beginPath();c.arc(x+3,y-2,2.5,0,Math.PI*2);c.fill();
     c.fillStyle='#000';c.shadowBlur=0;
     c.beginPath();c.arc(x-3,y-2,1.2,0,Math.PI*2);c.fill();
     c.beginPath();c.arc(x+3,y-2,1.2,0,Math.PI*2);c.fill();
     c.restore();
   }},
  {id:'void',name:'VOID',req:350,tier:'DIFÍCIL',tc:'#ff6a00',color:'#ff2d78',trail:'#cc0050',
   draw(c,x,y,r,p,f){
     c.save();
     const g=c.createRadialGradient(x,y,0,x,y,r*p*2.4);
     g.addColorStop(0,'#000');g.addColorStop(.45,'#2d0018');g.addColorStop(1,'transparent');
     c.fillStyle=g;c.beginPath();c.arc(x,y,r*p*2.4,0,Math.PI*2);c.fill();
     for(let i=0;i<3;i++){
       c.strokeStyle=`rgba(255,45,120,${.65-i*.18})`;c.lineWidth=1.2;
       c.shadowColor='#ff2d78';c.shadowBlur=16;
       c.beginPath();c.ellipse(x,y,r*p*(1.1+i*.55),r*p*(.42+i*.22),f*(.028+i*.018),0,Math.PI*2);
       c.stroke();
     }
     c.fillStyle='#000';c.shadowBlur=0;
     c.beginPath();c.arc(x,y,r*.45,0,Math.PI*2);c.fill();
     c.restore();
   }},
  {id:'thunder',name:'RAYO',req:500,tier:'ÉPICO',tc:'#ff2d78',color:'#ffe600',trail:'#ffaa00',
   draw(c,x,y,r,p,f){
     c.save();
     c.shadowColor='#ffe600';c.shadowBlur=35;
     for(let i=0;i<5;i++){
       const a=f*.12+i*(Math.PI*2/5);
       const ex=x+Math.cos(a)*r*p*1.65,ey=y+Math.sin(a)*r*p*1.65;
       const mx=x+(ex-x)*.5+(Math.random()-.5)*7,my=y+(ey-y)*.5+(Math.random()-.5)*7;
       c.strokeStyle=`rgba(255,230,0,${.45+.4*Math.sin(f*.2+i)})`;c.lineWidth=1.5;
       c.beginPath();c.moveTo(x,y);c.quadraticCurveTo(mx,my,ex,ey);c.stroke();
     }
     c.fillStyle='#ffe600';c.shadowBlur=25;
     c.beginPath();c.arc(x,y,r*p,0,Math.PI*2);c.fill();
     c.fillStyle='#fff';c.shadowBlur=6;
     c.beginPath();c.arc(x,y,r*.4,0,Math.PI*2);c.fill();
     c.restore();
   }},
  {id:'plasma',name:'PLASMA',req:700,tier:'ÉPICO',tc:'#ff2d78',color:'#e040fb',trail:'#aa00ff',
   draw(c,x,y,r,p,f){
     c.save();
     for(let i=3;i>=0;i--){
       const rr=r*p*(1.2+i*.4);
       c.globalAlpha=.28-i*.06;
       c.fillStyle='#e040fb';c.shadowColor='#e040fb';c.shadowBlur=20+i*5;
       c.beginPath();c.arc(x,y,rr,0,Math.PI*2);c.fill();
     }
     c.globalAlpha=1;
     c.fillStyle='#e040fb';c.shadowBlur=30;
     c.beginPath();c.arc(x,y,r*p,0,Math.PI*2);c.fill();
     c.strokeStyle='rgba(255,255,255,.5)';c.lineWidth=1.5;c.shadowBlur=5;
     c.beginPath();c.arc(x,y,r*.5,f*.1,f*.1+Math.PI*1.5);c.stroke();
     c.restore();
   }},
  {id:'god',name:'DIOS',req:1000,tier:'LEGENDARIO',tc:'#ffe600',color:'#ffffff',trail:'#aaaaff',
   draw(c,x,y,r,p,f){
     c.save();
     const cols=['#ff2d78','#ff6a00','#ffe600','#39ff14','#00ffe7','#b388ff'];
     for(let i=0;i<cols.length;i++){
       const a=f*.04+i*(Math.PI/3);
       c.strokeStyle=cols[i];c.lineWidth=2.5;c.shadowColor=cols[i];c.shadowBlur=22;
       c.beginPath();c.arc(x,y,r*p*(1.6+i*.28),a,a+Math.PI*.6);c.stroke();
     }
     const grd=c.createRadialGradient(x,y,0,x,y,r*p*1.1);
     grd.addColorStop(0,'#ffffff');grd.addColorStop(.5,'#ccccff');grd.addColorStop(1,'transparent');
     c.fillStyle=grd;c.shadowColor='#fff';c.shadowBlur=40;
     c.beginPath();c.arc(x,y,r*p*1.1,0,Math.PI*2);c.fill();
     c.fillStyle='#fff';c.shadowBlur=8;
     c.beginPath();c.arc(x,y,4,0,Math.PI*2);c.fill();
     c.restore();
   }},
];

let skinId=localStorage.getItem('vr_skin')||'cyber';
let unlocked=JSON.parse(localStorage.getItem('vr_unlocked')||'["cyber"]');
const getSkin=()=>SKINS.find(s=>s.id===skinId)||SKINS[0];

// ═══ MODES ════════════════════════════════════
const MODES={
  survival:{id:'survival',label:'SURVIVAL',icon:'🌀',desc:'Sobrevive lo más\nposible. Sin límite.',color:'#00ffe7',bk:'vr_bs',rate:.05,zen:false,tl:null},
  blitz:   {id:'blitz',   label:'BLITZ',   icon:'⚡',desc:'60 segundos.\nMáxima puntuación.',color:'#ffe600',bk:'vr_bb',rate:.11,zen:false,tl:60},
  zen:     {id:'zen',     label:'ZEN',     icon:'🌊',desc:'Velocidad fija baja.\nSin límite de tiempo.',color:'#39ff14',bk:'vr_bz',rate:.04,zen:true,tl:null},
};
const getBest=m=>parseInt(localStorage.getItem(MODES[m].bk)||'0');
const setBest=(m,v)=>localStorage.setItem(MODES[m].bk,v);

// ═══ STATE ════════════════════════════════════
let gState='menu';
let curMode='survival';
let score=0,frame=0,level=1,lastLevel=1,lastMS=0;
let timeLeft=60;
let animId=null;
let shakeX=0,shakeY=0,shakeMag=0;

// ═══ PLAYER ══════════════════════════════════
let pl={x:W/2,y:H*.75,r:10,vx:0,vy:0,inv:0};
let mouseX=W/2,mouseY=H*.75;
let dashCD=0,dashMax=100,dashing=false,dashT=0,dashAngle=0;
const DASH_DUR=11,DASH_F=18;

function initPlayer(){
  pl={x:W/2,y:H*.75,r:10,vx:0,vy:0,inv:0};
  mouseX=W/2;mouseY=H*.75;
  dashCD=0;dashing=false;dashT=0;dashAngle=0;
}

function updatePlayer(){
  const dx=mouseX-pl.x, dy=mouseY-pl.y;
  const dist=Math.sqrt(dx*dx+dy*dy);

  if(dashing){
    dashT--;
    pl.vx=Math.cos(dashAngle)*DASH_F;
    pl.vy=Math.sin(dashAngle)*DASH_F;
    pl.inv=Math.max(pl.inv,dashT+4);
    if(dashT<=0)dashing=false;
  } else {
    if(dist>2){
      const force=Math.min(dist*.048,1.75);
      pl.vx=(pl.vx+(dx/dist)*force)*.83;
      pl.vy=(pl.vy+(dy/dist)*force)*.83;
    } else {
      pl.vx*=.72; pl.vy*=.72;
    }
  }

  // Cap velocidad
  const spd=Math.sqrt(pl.vx*pl.vx+pl.vy*pl.vy);
  if(spd>13){pl.vx=pl.vx/spd*13;pl.vy=pl.vy/spd*13;}

  pl.x+=pl.vx; pl.y+=pl.vy;

  // Rebote elástico en paredes
  if(pl.x<pl.r){pl.x=pl.r;pl.vx=Math.abs(pl.vx)*.5;}
  if(pl.x>W-pl.r){pl.x=W-pl.r;pl.vx=-Math.abs(pl.vx)*.5;}
  if(pl.y<pl.r){pl.y=pl.r;pl.vy=Math.abs(pl.vy)*.5;}
  if(pl.y>H-pl.r){pl.y=H-pl.r;pl.vy=-Math.abs(pl.vy)*.5;}

  if(pl.inv>0)pl.inv--;
  if(dashCD>0)dashCD--;
  document.getElementById('dashFill').style.width=((1-dashCD/dashMax)*100)+'%';
}

function triggerDash(){
  if(dashCD>0||dashing)return;
  SFX.dash();
  dashing=true; dashT=DASH_DUR; dashCD=dashMax;
  const dx=mouseX-pl.x, dy=mouseY-pl.y, d=Math.sqrt(dx*dx+dy*dy)||1;
  dashAngle=Math.atan2(dy,dx);
  burst(pl.x,pl.y,getSkin().color,8);
}

// ═══ OBSTACLES ════════════════════════════════
let obstacles=[];

function getSpeed(){
  if(MODES[curMode].zen)return 2.4+Math.random()*.5;
  return 2.2+level*.55+Math.random()*1.3;
}

function spawnObs(){
  const spd=getSpeed(), roll=Math.random();
  if(roll<.28){
    const gap=68+Math.random()*75, gx=28+Math.random()*(W-56-gap);
    obstacles.push({type:'bar',x:0,    y:-14,w:gx,        h:14,speed:spd,color:'#ff2d78'});
    obstacles.push({type:'bar',x:gx+gap,y:-14,w:W-gx-gap, h:14,speed:spd,color:'#ff2d78'});
  } else if(roll<.5){
    const n=2+Math.floor(Math.random()*3);
    for(let i=0;i<n;i++)
      obstacles.push({type:'orb',x:22+Math.random()*(W-44),y:-20,r:9,speed:spd,vx:(Math.random()-.5)*3.5,color:'#ffe600',bounces:0});
  } else if(roll<.65){
    obstacles.push({type:'bar',x:0,y:-8,w:W,h:8,speed:spd*1.5,color:'#ff2d78'});
  } else if(roll<.8){
    const fl=Math.random()>.5;
    obstacles.push({type:'drifter',x:fl?-22:W+22,y:Math.random()*H*.5,r:11,speed:0,vx:fl?3.5:-3.5,vy:spd,color:'#b388ff'});
  } else {
    const n=3+Math.floor(Math.random()*4);
    for(let i=0;i<n;i++)
      obstacles.push({type:'bullet',x:28+Math.random()*(W-56),y:-24-i*22,r:6,speed:spd*1.25,color:'#00ffe7'});
  }
}

// ═══ PARTICLES ════════════════════════════════
let particles=[];

function burst(x,y,color,n=14){
  for(let i=0;i<n;i++){
    const a=(Math.PI*2*i)/n+Math.random()*.5, spd=1.8+Math.random()*4.5;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,decay:.03+Math.random()*.04,r:2+Math.random()*3.5,color,grav:true});
  }
}
function emitTrail(x,y){
  particles.push({x,y,vx:(Math.random()-.5)*.4,vy:Math.random()*.3,life:.62,decay:.056,r:2.5+Math.random()*2,color:getSkin().trail,trail:true});
}
function emitDash(x,y){
  particles.push({x,y,vx:(Math.random()-.5)*2,vy:(Math.random()-.5)*2,life:.8,decay:.07,r:4+Math.random()*4,color:getSkin().color,trail:true});
}

// ═══ STARS ════════════════════════════════════
let stars=[];
function initStars(){
  stars=Array.from({length:90},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.7,spd:.18+Math.random()*.6,a:Math.random()}));
}

// ═══ COLLISION ════════════════════════════════
function circRect(cx,cy,cr,rx,ry,rw,rh){
  const nx=Math.max(rx,Math.min(cx,rx+rw)), ny=Math.max(ry,Math.min(cy,ry+rh));
  return (cx-nx)**2+(cy-ny)**2<cr*cr;
}

// ═══ UPDATE ═══════════════════════════════════
function update(){
  frame++;
  const mode=MODES[curMode];

  score+=mode.rate;

  if(!mode.zen){
    level=1+Math.floor(score/20);
    if(level>lastLevel){SFX.lvlup();lastLevel=level;}
  }

  const ms=Math.floor(score/10);
  if(ms>lastMS&&score>5){SFX.score();lastMS=ms;checkUnlocks(Math.floor(score));}

  // Blitz timer
  if(curMode==='blitz'){
    timeLeft-=1/60;
    const pct=Math.max(0,timeLeft/mode.tl);
    document.getElementById('timerFill').style.width=(pct*100)+'%';
    if(timeLeft<=10&&Math.floor(timeLeft)!==Math.floor(timeLeft+1/60))SFX.tick();
    if(timeLeft<=0){timeLeft=0;SFX.end();endGame();return;}
  }

  updateHUD();

  const sv=mode.zen?.25:1;
  stars.forEach(s=>{s.y+=s.spd*sv;if(s.y>H){s.y=0;s.x=Math.random()*W;}});

  updatePlayer();
  if(frame%2===0){dashing?emitDash(pl.x,pl.y):emitTrail(pl.x,pl.y);}

  const spawnRate=mode.zen?75:Math.max(20,62-level*4);
  if(frame%spawnRate===0)spawnObs();

  obstacles.forEach(o=>{
    o.y+=o.speed;
    if(o.type==='orb'){o.x+=o.vx;if(o.x<o.r||o.x>W-o.r){o.vx*=-1;o.bounces++;if(o.bounces>6)o.y=H+120;}}
    if(o.type==='drifter')o.x+=o.vx;
  });
  obstacles=obstacles.filter(o=>{
    if(o.type==='drifter')return o.y<H+55&&o.x>-65&&o.x<W+65;
    return o.y<H+70;
  });

  // Collision — solo si no está en invencible
  if(pl.inv<=0){
    for(const o of obstacles){
      let hit=false;
      if(o.type==='bar')  hit=circRect(pl.x,pl.y,pl.r-2,o.x,o.y,o.w,o.h);
      else                {const dx=pl.x-o.x,dy=pl.y-o.y;hit=dx*dx+dy*dy<(pl.r+o.r-2)**2;}
      if(hit){
        SFX.die(); shakeMag=12;
        burst(pl.x,pl.y,getSkin().color,24);
        burst(pl.x,pl.y,'#ff2d78',14);
        checkUnlocks(Math.floor(score));
        endGame(); return;
      }
    }
  }

  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;if(p.grav)p.vy+=.08;});
  particles=particles.filter(p=>p.life>0);

  shakeMag*=.78;
  shakeX=shakeMag*(Math.random()-.5)*2;
  shakeY=shakeMag*(Math.random()-.5)*2;
}

function updateHUD(){
  document.getElementById('sd').textContent=Math.floor(score);
  document.getElementById('bd').textContent=getBest(curMode);
  if(curMode==='blitz'){
    document.getElementById('xhud').innerHTML='TIEMPO <b>'+Math.ceil(Math.max(0,timeLeft))+'s</b>';
  } else {
    document.getElementById('xhud').innerHTML='NIVEL <b>'+level+'</b>';
  }
}

// ═══ DRAW ═════════════════════════════════════
function hexRGB(h){return`${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`;}

function draw(){
  ctx.save();
  ctx.translate(shakeX,shakeY);

  // Fondo
  ctx.fillStyle='rgba(7,5,15,.87)';
  ctx.fillRect(-8,-8,W+16,H+16);

  // Tinte de modo
  ctx.fillStyle=`rgba(${hexRGB(MODES[curMode].color)},.012)`;
  ctx.fillRect(0,0,W,H);

  // Estrellas
  for(const s of stars){
    ctx.save();
    ctx.globalAlpha=s.a*.72;
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Partículas
  for(const p of particles){
    ctx.save();
    ctx.globalAlpha=p.life*(p.trail?.38:.88);
    ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=p.trail?5:13;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*(p.trail?.78:1),0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Obstáculos
  for(const o of obstacles){
    ctx.save();
    ctx.shadowColor=o.color;ctx.shadowBlur=15;ctx.fillStyle=o.color;
    if(o.type==='bar'){
      ctx.fillRect(o.x,o.y,o.w,o.h);
      ctx.fillStyle='rgba(255,255,255,.15)';
      ctx.fillRect(o.x+2,o.y+2,o.w-4,4);
    } else {
      ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fill();
      if(o.type==='orb'){
        ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.stroke();
      }
    }
    ctx.restore();
  }

  // ── JUGADOR ── (siempre visible salvo parpadeo de invencibilidad)
  const showPlayer = pl.inv<=0 || (frame%4<2);
  if(showPlayer){
    ctx.save();
    const pulse=1+.08*Math.sin(frame*.15);
    if(dashing){
      ctx.globalAlpha=.65+.3*Math.sin(frame*.4);
    }
    // Llamada a la skin — cada skin gestiona su propio ctx.save/restore
    getSkin().draw(ctx, pl.x, pl.y, pl.r, pulse, frame);
    ctx.restore();
  }

  // Flecha de dash
  if(dashCD===0&&!dashing){
    const dx=mouseX-pl.x, dy=mouseY-pl.y, d=Math.sqrt(dx*dx+dy*dy)||1;
    if(d>25){
      ctx.save();
      ctx.globalAlpha=.14;ctx.strokeStyle=getSkin().color;
      ctx.lineWidth=1;ctx.setLineDash([4,7]);
      ctx.beginPath();ctx.moveTo(pl.x,pl.y);
      ctx.lineTo(pl.x+(dx/d)*42,pl.y+(dy/d)*42);ctx.stroke();
      ctx.restore();
    }
  }

  // Flash rojo en blitz
  if(curMode==='blitz'&&timeLeft<=10&&frame%10<5){
    ctx.save();ctx.globalAlpha=.07;ctx.fillStyle='#ff2d78';
    ctx.fillRect(0,0,W,H);ctx.restore();
  }

  ctx.restore(); // fin shake
}

// ═══ LOOP ═════════════════════════════════════
function loop(){
  if(gState!=='playing')return;
  update();draw();
  animId=requestAnimationFrame(loop);
}

// ═══ STATE MACHINE ════════════════════════════
const showP=id=>document.getElementById(id).classList.add('show');
const hideP=id=>document.getElementById(id).classList.remove('show');

function selectMode(modeId){
  AC();SFX.select();
  curMode=modeId;
  document.getElementById('mn').textContent=MODES[modeId].label;
  hideP('panMenu');
  startCountdown();
}

function startCountdown(){
  gState='countdown';
  showP('panCD');
  let n=3;
  const el=document.getElementById('cdN');
  function tick(){
    el.textContent=n;SFX.tick();
    if(n>0){n--;setTimeout(tick,800);}
    else{
      el.textContent='¡YA!';
      setTimeout(()=>{hideP('panCD');beginPlay();},450);
    }
  }
  tick();
}

function beginPlay(){
  // Reset total
  score=0; frame=0; level=1; lastLevel=1; lastMS=0;
  obstacles=[]; particles=[];
  timeLeft=MODES.blitz.tl;

  initPlayer();
  initStars();

  const tb=document.getElementById('timerBar');
  tb.style.display=curMode==='blitz'?'block':'none';
  if(curMode==='blitz')document.getElementById('timerFill').style.width='100%';

  updateHUD();
  gState='playing';
  loop();
}

function endGame(){
  gState='dead';
  cancelAnimationFrame(animId);
  draw();

  const s=Math.floor(score);
  const isNew=s>getBest(curMode);
  if(isNew)setBest(curMode,s);
  document.getElementById('bd').textContent=getBest(curMode);

  document.getElementById('goTitle').textContent=
    (curMode==='blitz'&&timeLeft<=0)?'— TIEMPO AGOTADO —':'— GAME OVER —';
  document.getElementById('goScore').textContent=s;
  document.getElementById('goBadge').style.display=isNew?'block':'none';
  showP('panGO');
}

function retry()  {SFX.select();hideP('panGO');startCountdown();}
function backMenu(){SFX.select();hideP('panGO');buildModesUI();showP('panMenu');}
function openSkins(){SFX.select();buildSkinsUI();hideP('panMenu');showP('panSkins');}
function closeSkins(){SFX.select();hideP('panSkins');buildModesUI();showP('panMenu');}

// ═══ UNLOCKS ══════════════════════════════════
function checkUnlocks(s){
  let ch=false;
  SKINS.forEach(sk=>{
    if(s>=sk.req&&!unlocked.includes(sk.id)){unlocked.push(sk.id);ch=true;showToast(sk.name,sk.tc);}
  });
  if(ch)localStorage.setItem('vr_unlocked',JSON.stringify(unlocked));
}
function showToast(name,col){
  const el=document.createElement('div');
  el.style.cssText=`position:fixed;top:18%;left:50%;transform:translateX(-50%);
    font-family:'Press Start 2P',monospace;font-size:.58rem;
    color:${col};text-shadow:0 0 14px ${col};
    background:rgba(7,5,15,.96);border:2px solid ${col};
    padding:.8rem 1.4rem;z-index:999;text-align:center;line-height:2.2;
    animation:toastAnim 2.8s forwards;pointer-events:none;`;
  el.innerHTML=`✦ SKIN DESBLOQUEADA ✦<br><span style="color:#fff">${name}</span>`;
  const st=document.createElement('style');
  st.textContent='@keyframes toastAnim{0%{opacity:1;top:18%}75%{opacity:1}100%{opacity:0;top:13%}}';
  document.head.appendChild(st);document.body.appendChild(el);
  setTimeout(()=>el.remove(),2900);
  SFX.unlock();
}

// ═══ SKINS UI ═════════════════════════════════
function buildSkinsUI(){
  const grid=document.getElementById('skinGrid');
  grid.innerHTML='';
  SKINS.forEach(sk=>{
    const isU=unlocked.includes(sk.id), isSel=sk.id===skinId;
    const card=document.createElement('div');
    card.className='scard'+(isSel?' sel':'')+(isU?'':' lk');

    const cv=document.createElement('canvas');cv.width=52;cv.height=52;
    const cx=cv.getContext('2d');
    cx.fillStyle='#07050f';cx.fillRect(0,0,52,52);
    if(isU){
      cx.save();
      // Resetear estado del contexto antes de dibujar
      cx.globalAlpha=1;cx.shadowBlur=0;cx.setLineDash&&cx.setLineDash([]);
      sk.draw(cx,26,26,10,1,40);
      cx.restore();
    } else {
      cx.fillStyle='#1c1c1c';cx.beginPath();cx.arc(26,26,10,0,Math.PI*2);cx.fill();
    }

    const nm=document.createElement('div');nm.className='sname';nm.textContent=sk.name;
    const rq=document.createElement('div');rq.className='sreq';rq.textContent=sk.req===0?'GRATIS':'≥'+sk.req;
    const ti=document.createElement('div');ti.className='stier';
    ti.style.color=sk.tc;ti.style.textShadow=`0 0 6px ${sk.tc}`;ti.textContent=sk.tier;

    if(!isU){const li=document.createElement('div');li.className='lkico';li.textContent='🔒';card.appendChild(li);}
    card.appendChild(cv);card.appendChild(nm);card.appendChild(rq);card.appendChild(ti);

    card.onclick=()=>{
      if(!isU){SFX.locked();return;}
      SFX.select();skinId=sk.id;
      localStorage.setItem('vr_skin',skinId);
      buildSkinsUI();
    };
    grid.appendChild(card);
  });
}

// ═══ MODES UI ═════════════════════════════════
function buildModesUI(){
  const grid=document.getElementById('modeGrid');
  grid.innerHTML='';
  Object.values(MODES).forEach(m=>{
    const card=document.createElement('div');
    card.className='mcard';
    card.style.borderColor=m.color+'33';
    card.innerHTML=`
      <div class="micon">${m.icon}</div>
      <div class="mname" style="color:${m.color};text-shadow:0 0 8px ${m.color}88">${m.label}</div>
      <div class="mdesc">${m.desc.replace('\n','<br>')}</div>
      <div class="mbest">BEST: ${getBest(m.id)}</div>`;
    card.onmouseenter=()=>{card.style.borderColor=m.color;card.style.boxShadow=`0 0 16px ${m.color}55`;};
    card.onmouseleave=()=>{card.style.borderColor=m.color+'33';card.style.boxShadow='none';};
    card.onclick=()=>selectMode(m.id);
    grid.appendChild(card);
  });
}

// ═══ INPUT ════════════════════════════════════
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mouseX=e.clientX-r.left; mouseY=e.clientY-r.top;
});
canvas.addEventListener('mousedown',()=>{if(gState==='playing')triggerDash();});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  mouseX=e.touches[0].clientX-r.left; mouseY=e.touches[0].clientY-r.top;
},{passive:false});
canvas.addEventListener('touchstart',e=>{
  const r=canvas.getBoundingClientRect();
  mouseX=e.touches[0].clientX-r.left; mouseY=e.touches[0].clientY-r.top;
  if(gState==='playing')triggerDash();
});
window.addEventListener('keydown',e=>{
  if(e.code==='Space'&&gState==='playing'){e.preventDefault();triggerDash();}
});

// ═══ IDLE LOOP ════════════════════════════════
initStars();
pl={x:W/2,y:H*.75,r:10,vx:0,vy:0,inv:0};
obstacles=[];particles=[];

function idleLoop(){
  if(gState!=='menu')return;
  frame++;
  stars.forEach(s=>{s.y+=s.spd*.3;if(s.y>H){s.y=0;s.x=Math.random()*W;}});
  if(frame%3===0)emitTrail(W/2+Math.sin(frame*.03)*75,H*.72+Math.cos(frame*.02)*38);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;});
  particles=particles.filter(p=>p.life>0);

  ctx.fillStyle='rgba(7,5,15,.82)';ctx.fillRect(0,0,W,H);

  for(const s of stars){
    ctx.save();ctx.globalAlpha=s.a*.5;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();ctx.restore();
  }
  for(const p of particles){
    ctx.save();ctx.globalAlpha=p.life*.33;ctx.fillStyle=p.color;
    ctx.shadowColor=p.color;ctx.shadowBlur=5;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*.7,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  const ix=W/2+Math.sin(frame*.03)*75, iy=H*.72+Math.cos(frame*.02)*38;
  pl.x=ix; pl.y=iy;
  ctx.save();
  ctx.globalAlpha=1; // asegurar opacidad total
  getSkin().draw(ctx,ix,iy,10,1+.1*Math.sin(frame*.1),frame);
  ctx.restore();

  requestAnimationFrame(idleLoop);
}

// ── Arranque ──
buildModesUI();
idleLoop();

// Refrescar bests al volver al menú
new MutationObserver(()=>{
  if(document.getElementById('panMenu').classList.contains('show'))buildModesUI();
}).observe(document.getElementById('panMenu'),{attributes:true,attributeFilter:['class']});
</script>
